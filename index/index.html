<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="莫雪 · 软件工程专业 · 竞赛与项目经历 · 个人简历网站">
    <title>莫雪 | 软件工程 · 竞赛先锋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* CSS 变量 (浅色模式) */
        :root {
            --bg-page: #f9fafc;
            --surface: #ffffff;
            --surface-2: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --accent: #4f46e5;
            --accent-light: #818cf8;
            --accent-soft: #eef2ff;
            --shadow-sm: 0 4px 6px -2px rgba(0 0 0 / 0.05), 0 1px 2px -1px rgba(0 0 0 / 0.05);
            --shadow-md: 0 10px 15px -3px rgba(0 0 0 / 0.08), 0 4px 6px -2px rgba(0 0 0 / 0.05);
            --radius-lg: 1.5rem;
            --radius-md: 1rem;
            --radius-sm: 0.75rem;
            --transition: all 0.2s ease;
        }

        body.dark {
            --bg-page: #0f172a;
            --surface: #1e293b;
            --surface-2: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border: #334155;
            --accent: #818cf8;
            --accent-light: #a5b4fc;
            --accent-soft: #2d3a5e;
        }

        body {
            background: var(--bg-page);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif;
            line-height: 1.5;
            scroll-behavior: smooth;
            transition: background 0.2s, color 0.2s;
        }

        /* 容器 */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* 导航栏固定顶部 */
        .navbar {
            position: sticky;
            top: 0;
            backdrop-filter: blur(12px);
            background: rgba(var(--bg-page-rgb, 249, 250, 252), 0.85);
            background: color-mix(in srgb, var(--bg-page) 85%, transparent);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            padding: 0.85rem 0;
        }
        body.dark .navbar {
            background: color-mix(in srgb, #0f172a 85%, transparent);
        }
        .nav-inner {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition);
        }
        .nav-links a:hover {
            color: var(--accent);
        }
        .action-buttons {
            display: flex;
            gap: 0.75rem;
        }
        .icon-btn {
            background: var(--surface-2);
            border: none;
            border-radius: 2rem;
            width: 2.4rem;
            height: 2.4rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-secondary);
            transition: var(--transition);
        }
        .icon-btn:hover {
            background: var(--accent);
            color: white;
        }

        /* 通用区块间距 */
        section {
            margin: 3.5rem 0;
            scroll-margin-top: 5rem;
        }
        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 1.8rem;
            border-left: 5px solid var(--accent);
            padding-left: 1rem;
        }

        /* Hero区域 */
        .hero {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 2rem 2rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            margin-top: 1.5rem;
        }
        .hero h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, var(--accent), var(--accent-light));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .hero-badge-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin: 1rem 0;
        }
        .badge {
            background: var(--accent-soft);
            color: var(--accent);
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .contact-btns {
            display: flex;
            gap: 1rem;
            margin-top: 1.2rem;
            flex-wrap: wrap;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.2s;
        }

        /* 亮点成果卡片网格 */
        .highlights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
        }
        .highlight-card {
            background: var(--surface);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            border: 1px solid var(--border);
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }
        .highlight-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }
        .highlight-number {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
        }

        /* Tabs 组件 */
        .tabs-container {
            background: var(--surface);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .tabs-header {
            display: flex;
            gap: 0.5rem;
            background: var(--surface-2);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 0.6rem 1.2rem;
            font-weight: 600;
            border-radius: 2rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: var(--shadow-sm);
        }
        .tab-pane {
            display: none;
            padding: 1.8rem;
            animation: fade 0.2s ease;
        }
        .tab-pane.active {
            display: block;
        }
        @keyframes fade {
            from { opacity: 0; transform: translateY(5px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .exp-item {
            margin-bottom: 1.8rem;
            border-left: 3px solid var(--accent);
            padding-left: 1rem;
        }
        .exp-title {
            font-weight: 700;
            font-size: 1.2rem;
        }
        .exp-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0.3rem 0 0.6rem;
        }
        .exp-desc {
            list-style: disc;
            padding-left: 1.2rem;
            color: var(--text-secondary);
        }

        /* 项目卡片网格 */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.6rem;
            margin-top: 1rem;
        }
        .project-card {
            background: var(--surface);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            padding: 1.5rem;
            transition: var(--transition);
        }
        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
        }
        .project-name {
            font-size: 1.3rem;
            font-weight: 700;
        }
        .project-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin: 0.8rem 0;
        }
        .tech-tag {
            background: var(--accent-soft);
            font-size: 0.7rem;
            padding: 0.2rem 0.7rem;
            border-radius: 1rem;
            color: var(--accent);
        }
        .project-result {
            font-weight: 500;
            margin: 0.6rem 0;
            color: var(--accent);
        }

        /* 技能矩阵 */
        .skills-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            background: var(--surface);
            padding: 1.8rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }
        .skill-cat {
            flex: 1 1 200px;
        }
        .skill-name {
            font-weight: 600;
            margin-bottom: 0.3rem;
        }
        .progress-bar {
            background: var(--surface-2);
            height: 0.5rem;
            border-radius: 1rem;
            overflow: hidden;
            margin-top: 0.3rem;
        }
        .progress-fill {
            background: var(--accent);
            width: 0%;
            height: 100%;
            border-radius: 1rem;
        }

        /* 教育区 */
        .edu-card {
            background: var(--surface);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            border: 1px solid var(--border);
        }
        footer {
            text-align: center;
            padding: 2rem 0;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .back2top {
            position: fixed;
            bottom: 2rem;
            right: 1.5rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 2rem;
            width: 2.8rem;
            height: 2.8rem;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            opacity: 0.7;
            transition: 0.2s;
            z-index: 99;
        }
        @media print {
            .navbar, .action-buttons, .back2top, .contact-btns .btn-outline, .icon-btn {
                display: none !important;
            }
            body, .dark, body.dark {
                background: white;
                color: black;
                --surface: white;
                --border: #ccc;
            }
            .hero, .highlight-card, .project-card, .tabs-container, .skills-grid {
                break-inside: avoid;
                box-shadow: none;
                border: 1px solid #ddd;
            }
            a {
                text-decoration: none;
                color: black;
            }
            .container {
                padding: 0;
            }
        }
        @media (max-width: 700px) {
            .nav-inner {
                flex-direction: column;
                align-items: stretch;
            }
            .nav-links {
                justify-content: center;
            }
            .hero h1 {
                font-size: 2rem;
            }
            .section-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        // ---------- 简历数据 ----------
        const resume = {
            basics: {
                name: "莫雪",
                title: "软件工程（数智空间） · 竞赛型开发者",
                phone: "18277236894",
                wechat: "18277236894",
                email: "moxue2026@163.com",
                summary: "具备组织协调与跨部门沟通能力，在多项国家级/省级学科竞赛中担任核心角色，擅长AI工具辅助与文案优化，C语言基础扎实，追求技术创新与落地。",
                keywords: ["Word/PPT高级应用", "视频剪辑", "AI辅助运营", "DeepSeek", "C语言", "团队协作"]
            },
            highlights: [
                { metric: "3项", desc: "国家级/省级竞赛奖项 (国三/省二/校二等奖)" },
                { metric: "20+页", desc: "商业计划书优化与答辩预设10+辩题，助力院一等奖" },
                { metric: "2轮", desc: "主导线下打磨，保障算法精英大赛校二等奖" },
                { metric: "100%", desc: "部门认证工作按时高质完成，零差错交付" }
            ],
            experiences: [
                { type: "campus", title: "院元旦晚会幕后收音负责人", org: "河南大学软件学院学习部", date: "2025.12", desc: ["主动联系活动主要负责人，组织部门成员协调话筒安排，演出期间高效交接回收，保障12+节目顺利收音。", "提前为演出人员穿戴调试，跨部门协作获得导演组好评。"] },
                { type: "campus", title: "学生部门认证与材料审核", org: "软件学院学生会", date: "2026.02", desc: ["第一时间响应负责人安排，研读评分细则，核查提交材料并查漏补缺。", "高质量完成认证表格整理，确保整体工作按期交付，通过率100%。"] }
            ],
            projects: [
                { name: "第七届全球校园人工智能算法精英大赛", role: "核心成员", stack: ["AI算法","Python","团队统筹"], highlights: "主导选题策划，搭建指导老师沟通桥梁，统筹线下打磨，助力团队获得校赛二等奖。", result: "校赛二等奖" },
                { name: "“挑战杯”大学生创业计划竞赛", role: "材料主理 & 答辩智囊", stack: ["商业计划书","市场分析","答辩策略"], highlights: "修缮商业计划书20余页，为主答辩手预设10+辩题，记录评委反馈复盘优化，荣获院赛一等奖。", result: "院赛一等奖" },
                { name: "第十八届先进机器人及仿真技术大赛", role: "创新策略负责人", stack: ["机器人仿真","文献调研","方案精简"], highlights: "省赛阶段提出创新增加点并查阅文献支撑，国赛阶段整理技术报告，合并冗余功能，完成演示核心内容。", result: "省赛二等奖 & 国赛三等奖" }
            ],
            skills: [
                { category: "办公与设计", items: [{ name: "Word/PPT 高级编排", level: 85 }, { name: "视频剪辑/后期", level: 75 }] },
                { category: "AI 工具链", items: [{ name: "DeepSeek / AI辅助", level: 80 }, { name: "AI 文案优化", level: 78 }] },
                { category: "编程基础", items: [{ name: "C语言基础", level: 70 }, { name: "Python 入门", level: 65 }] }
            ],
            education: {
                school: "河南大学",
                major: "软件工程（数智空间）",
                period: "2025.06 — 2029.09",
                degree: "本科在读",
                awards: "校赛二等奖、院赛一等奖、省级机器人竞赛二等奖/国赛三等奖"
            },
            footer: "© 2025 莫雪 · 更新于2026年3月"
        };

        // 辅助渲染函数
        function buildApp() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <nav class="navbar">
                    <div class="container nav-inner">
                        <div class="logo">❄️ 莫雪</div>
                        <div class="nav-links">
                            <a href="#hero">首页</a>
                            <a href="#highlights">亮点</a>
                            <a href="#experience">经历</a>
                            <a href="#projects">项目</a>
                            <a href="#skills">技能</a>
                            <a href="#education">教育</a>
                        </div>
                        <div class="action-buttons">
                            <button class="icon-btn" id="themeToggle" aria-label="深浅色模式">🌓</button>
                            <button class="icon-btn" id="printBtn" aria-label="打印PDF">🖨️</button>
                        </div>
                    </div>
                </nav>
                <main class="container">
                    <section id="hero" class="hero">
                        <h1>${resume.basics.name}</h1>
                        <p style="font-size:1.1rem; color:var(--text-secondary); margin:0.5rem 0">${resume.basics.title}</p>
                        <p>${resume.basics.summary}</p>
                        <div class="hero-badge-group">
                            ${resume.basics.keywords.map(k => `<span class="badge">${k}</span>`).join('')}
                        </div>
                        <div class="contact-btns">
                            <button class="btn-primary" id="copyEmailBtn">📧 复制邮箱</button>
                            <button class="btn-outline" id="copyPhoneBtn">📱 复制手机号</button>
                            <span style="font-size:0.85rem; color:var(--text-muted);">微信同号: ${resume.basics.wechat}</span>
                        </div>
                    </section>

                    <section id="highlights">
                        <h2 class="section-title">✨ 亮点成果</h2>
                        <div class="highlights-grid" id="highlightsGrid"></div>
                    </section>

                    <section id="experience">
                        <h2 class="section-title">📌 实践经历</h2>
                        <div id="expTabsRoot" class="tabs-container"></div>
                    </section>

                    <section id="projects">
                        <h2 class="section-title">🚀 竞赛项目</h2>
                        <div id="projectsGrid" class="projects-grid"></div>
                    </section>

                    <section id="skills">
                        <h2 class="section-title">📊 技能矩阵</h2>
                        <div id="skillsMatrix" class="skills-grid"></div>
                    </section>

                    <section id="education">
                        <h2 class="section-title">🎓 教育背景</h2>
                        <div class="edu-card">
                            <div style="display:flex; justify-content:space-between; flex-wrap:wrap;"><strong>${resume.education.school} · ${resume.education.major}</strong><span>${resume.education.period}</span></div>
                            <div style="margin:0.5rem 0">🏅 荣誉奖项：${resume.education.awards}</div>
                            <div>📚 相关课程：软件工程导论、C程序设计、人工智能基础、数据结构</div>
                        </div>
                    </section>
                    <footer>${resume.footer}</footer>
                </main>
                <button class="back2top" id="back2topBtn" aria-label="返回顶部">↑</button>
            `;

            // 渲染亮点
            const highlightsGrid = document.getElementById('highlightsGrid');
            highlightsGrid.innerHTML = resume.highlights.map(h => `
                <div class="highlight-card">
                    <div class="highlight-number">${h.metric}</div>
                    <div style="margin-top:0.5rem">${h.desc}</div>
                </div>
            `).join('');

            // 渲染经历 tabs (只有校园类，但保留扩展)
            const expData = resume.experiences;
            const types = [...new Map(expData.map(e => [e.type, e])).keys()]; // 去重type
            const typeMap = { campus: "🏫 校园实践" };
            const tabContainer = document.getElementById('expTabsRoot');
            if (expData.length === 0) tabContainer.style.display = 'none';
            const tabsHeader = document.createElement('div');
            tabsHeader.className = 'tabs-header';
            const panesDiv = document.createElement('div');
            let activeType = types[0] || 'campus';
            types.forEach((type, idx) => {
                const label = typeMap[type] || (type === 'campus' ? '校园经历' : type);
                const btn = document.createElement('button');
                btn.className = `tab-btn ${idx === 0 ? 'active' : ''}`;
                btn.textContent = label;
                btn.setAttribute('data-type', type);
                btn.setAttribute('aria-selected', idx === 0 ? 'true' : 'false');
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#expTabsRoot .tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('#expTabsRoot .tab-pane').forEach(pane => pane.classList.remove('active'));
                    const targetPane = document.getElementById(`expPane-${type}`);
                    if (targetPane) targetPane.classList.add('active');
                });
                tabsHeader.appendChild(btn);
                const pane = document.createElement('div');
                pane.className = `tab-pane ${idx === 0 ? 'active' : ''}`;
                pane.id = `expPane-${type}`;
                const filtered = expData.filter(e => e.type === type);
                pane.innerHTML = filtered.map(exp => `
                    <div class="exp-item">
                        <div class="exp-title">${exp.title}</div>
                        <div class="exp-meta">${exp.org} · ${exp.date}</div>
                        <ul class="exp-desc">${exp.desc.map(d => `<li>${d}</li>`).join('')}</ul>
                    </div>
                `).join('');
                panesDiv.appendChild(pane);
            });
            tabContainer.innerHTML = '';
            tabContainer.appendChild(tabsHeader);
            tabContainer.appendChild(panesDiv);

            // 渲染项目卡片
            const projGrid = document.getElementById('projectsGrid');
            projGrid.innerHTML = resume.projects.map(p => `
                <div class="project-card">
                    <div class="project-name">${p.name}</div>
                    <div class="project-stack">${p.stack.map(s => `<span class="tech-tag">${s}</span>`).join('')}</div>
                    <div style="margin:0.5rem 0; font-size:0.9rem">${p.highlights}</div>
                    <div class="project-result">🏆 成果：${p.result}</div>
                    <div style="margin-top:0.5rem; font-size:0.75rem; color:var(--text-muted)">🎯 角色：${p.role}</div>
                </div>
            `).join('');

            // 技能矩阵 (进度条)
            const skillsDiv = document.getElementById('skillsMatrix');
            skillsDiv.innerHTML = '';
            resume.skills.forEach(cat => {
                const catDiv = document.createElement('div');
                catDiv.className = 'skill-cat';
                catDiv.innerHTML = `<div class="skill-name" style="margin-bottom:0.8rem;">📁 ${cat.category}</div>`;
                cat.items.forEach(item => {
                    const wrapper = document.createElement('div');
                    wrapper.style.marginBottom = '1rem';
                    wrapper.innerHTML = `
                        <div style="display:flex; justify-content:space-between;"><span>${item.name}</span><span>${item.level}%</span></div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${item.level}%;"></div></div>
                    `;
                    catDiv.appendChild(wrapper);
                });
                skillsDiv.appendChild(catDiv);
            });

            // 邮箱复制防爬 (拼接)
            const copyBtn = document.getElementById('copyEmailBtn');
            if (copyBtn) {
                copyBtn.addEventListener('click', () => {
                    const user = "moxue2026";
                    const domain = "163.com";
                    const email = `${user}@${domain}`;
                    navigator.clipboard.writeText(email).then(() => {
                        alert("✅ 邮箱已复制: " + email);
                    }).catch(() => alert("手动复制失败"));
                });
            }
            const copyPhoneBtn = document.getElementById('copyPhoneBtn');
            if (copyPhoneBtn) {
                copyPhoneBtn.addEventListener('click', () => {
                    navigator.clipboard.writeText(resume.basics.phone).then(() => {
                        alert("📞 手机号已复制: " + resume.basics.phone);
                    });
                });
            }
        }

        // 深浅模式 + 打印 + 返回顶部 + 平滑滚动
        function initGlobalFeatures() {
            // 主题切换
            const themeBtn = document.getElementById('themeToggle');
            const isDark = localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
            if (isDark) document.body.classList.add('dark');
            themeBtn?.addEventListener('click', () => {
                document.body.classList.toggle('dark');
                localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
            });
            // 打印
            const printBtn = document.getElementById('printBtn');
            printBtn?.addEventListener('click', () => window.print());
            // 返回顶部
            const topBtn = document.getElementById('back2topBtn');
            topBtn?.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
            // 平滑滚动导航锚点 (动态绑定)
            document.querySelectorAll('.nav-links a').forEach(anchor => {
                anchor.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href').substring(1);
                    const targetEl = document.getElementById(targetId);
                    if (targetEl) {
                        targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                });
            });
        }

        // 监听动态渲染完成后，补充键盘tab切换 ARIA
        function enhanceTabsAccessibility() {
            // 监听经历区域的tab键盘事件 (全局委托)
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                    const activeTab = document.querySelector('#expTabsRoot .tab-btn.active');
                    if (!activeTab) return;
                    const allTabs = Array.from(document.querySelectorAll('#expTabsRoot .tab-btn'));
                    const idx = allTabs.indexOf(activeTab);
                    if (e.key === 'ArrowRight' && idx < allTabs.length - 1) {
                        allTabs[idx+1].click();
                        allTabs[idx+1].focus();
                        e.preventDefault();
                    } else if (e.key === 'ArrowLeft' && idx > 0) {
                        allTabs[idx-1].click();
                        allTabs[idx-1].focus();
                        e.preventDefault();
                    }
                }
            });
            // 为现有tab按钮添加aria属性更新
            const updateAria = () => {
                document.querySelectorAll('#expTabsRoot .tab-btn').forEach(btn => {
                    const isActive = btn.classList.contains('active');
                    btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
                });
            };
            const observer = new MutationObserver(() => updateAria());
            const tabsHeader = document.querySelector('#expTabsRoot .tabs-header');
            if(tabsHeader) observer.observe(tabsHeader, { attributes: true, subtree: true, attributeFilter: ['class'] });
            updateAria();
        }

        // 启动
        buildApp();
        initGlobalFeatures();
        enhanceTabsAccessibility();
    </script>
</body>
</html>
